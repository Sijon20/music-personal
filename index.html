<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wavelength — Music Player</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    /* ─────────────────────────────────────────
       CSS VARIABLES & RESET
    ───────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0e0e0f;
      --surface:     #18181b;
      --surface-2:   #1f1f24;
      --border:      #2a2a30;
      --accent:      #c8f542;
      --accent-dim:  rgba(200, 245, 66, 0.12);
      --text:        #f0f0f0;
      --text-muted:  #6b6b7a;
      --text-soft:   #a0a0b0;
      --player-h:    88px;
      --player-effective-h: var(--player-h);
      --radius:      10px;

      /* album art gradient placeholder */
      --art-grad: linear-gradient(135deg, #2a2a3e 0%, #1a1a2e 35%, #16213e 70%, #0f3460 100%);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      letter-spacing: 0.01em;
      overflow: hidden;
    }

    /* ─────────────────────────────────────────
       LAYOUT SHELL
    ───────────────────────────────────────── */
    .app {
      display: grid;
      grid-template-rows: auto 1fr;
      height: calc(100dvh - var(--player-effective-h));
      overflow: hidden;
    }

    /* ─────────────────────────────────────────
       TOP BAR / HEADER
    ───────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 32px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      position: relative;
      z-index: 10;
    }

    .logo {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .logo span {
      color: var(--accent);
    }

    .header-meta {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ─────────────────────────────────────────
       MAIN CONTENT / PLAYLIST AREA
    ───────────────────────────────────────── */
    main {
      overflow-y: auto;
      padding: 24px 32px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    main::-webkit-scrollbar { width: 4px; }
    main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    .section-label {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .library-toolbar {
      margin-bottom: 14px;
    }

    .search-input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      padding: 10px 12px;
      font-family: inherit;
      font-size: 12px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .search-input::placeholder {
      color: var(--text-muted);
    }

    .search-input:focus {
      border-color: rgba(200,245,66,0.45);
      box-shadow: 0 0 0 3px rgba(200,245,66,0.1);
    }

    /* ─────────────────────────────────────────
       PLAYLIST
    ───────────────────────────────────────── */
    #playlist {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    #playlist li {
      display: grid;
      grid-template-columns: 28px 1fr auto auto;
      align-items: center;
      gap: 14px;
      padding: 11px 14px;
      border-radius: var(--radius);
      border: 1px solid transparent;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      position: relative;
      overflow: hidden;
    }

    #playlist li::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent-dim);
      opacity: 0;
      transition: opacity 0.2s;
    }

    #playlist li:hover { background: var(--surface); }
    #playlist li:hover::before { opacity: 0.5; }

    #playlist li.active {
      background: var(--surface-2);
      border-color: var(--border);
    }

    #playlist li.active::before { opacity: 1; }

    .track-num {
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
      font-weight: 300;
      transition: opacity 0.15s;
    }

    #playlist li.active .track-num,
    #playlist li:hover .track-num {
      opacity: 0;
    }

    .track-icon {
      display: none;
      position: absolute;
      left: 14px;
      width: 28px;
      text-align: center;
    }

    #playlist li.active .track-icon,
    #playlist li:hover .track-icon {
      display: block;
    }

    /* animated bars for active playing track */
    .bars {
      display: inline-flex;
      align-items: flex-end;
      gap: 2px;
      height: 14px;
    }

    .bars span {
      display: block;
      width: 3px;
      background: var(--accent);
      border-radius: 2px;
      animation: bar-bounce 0.8s ease-in-out infinite alternate;
    }

    .bars span:nth-child(1) { height: 6px;  animation-delay: 0s; }
    .bars span:nth-child(2) { height: 12px; animation-delay: 0.15s; }
    .bars span:nth-child(3) { height: 8px;  animation-delay: 0.3s; }

    @keyframes bar-bounce {
      from { transform: scaleY(0.4); }
      to   { transform: scaleY(1); }
    }

    /* play icon on hover (non-active) */
    #playlist li:not(.active):hover .track-icon::after {
      content: '▶';
      font-size: 11px;
      color: var(--text-soft);
    }

    .track-title {
      font-size: 13px;
      color: var(--text-soft);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color 0.15s;
    }

    #playlist li.active .track-title { color: var(--text); }
    #playlist li:hover .track-title   { color: var(--text); }

    .track-ext {
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: var(--surface);
      padding: 2px 6px;
      border-radius: 4px;
      border: 1px solid var(--border);
    }

    #playlist li.active .track-ext {
      background: var(--accent-dim);
      border-color: rgba(200,245,66,0.25);
      color: var(--accent);
    }

    .track-action {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 2;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
      padding: 0;
    }

    .track-action svg {
      width: 13px;
      height: 13px;
      fill: currentColor;
      display: block;
    }

    .track-action:hover {
      color: var(--text);
      border-color: rgba(200,245,66,0.4);
    }

    .track-action:disabled {
      opacity: 0.55;
      cursor: wait;
    }

    #playlist li.is-downloaded .track-action {
      color: #ff8f8f;
      border-color: rgba(255, 143, 143, 0.35);
      background: rgba(255, 143, 143, 0.08);
    }

    /* ─────────────────────────────────────────
       STATES: LOADING / EMPTY / ERROR
    ───────────────────────────────────────── */
    .state-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 56px 32px;
      text-align: center;
      color: var(--text-muted);
    }

    .state-card .icon {
      font-size: 36px;
      opacity: 0.4;
    }

    .state-card p {
      font-size: 13px;
      line-height: 1.7;
      max-width: 320px;
    }

    .state-inline {
      padding: 28px 20px;
    }

    .state-card code {
      background: var(--surface);
      padding: 2px 6px;
      border-radius: 4px;
      border: 1px solid var(--border);
      font-size: 11px;
      color: var(--accent);
    }

    /* spinner */
    .spinner {
      width: 28px;
      height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─────────────────────────────────────────
       BOTTOM PLAYER BAR — REDESIGNED
    ───────────────────────────────────────── */
    :root { --player-h: 90px; }

    .player-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: var(--player-h);
      background: rgba(18, 18, 20, 0.92);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-top: 1px solid var(--border);
      display: grid;
      grid-template-columns: 1fr 2fr 1fr;
      align-items: center;
      padding: 0 28px;
      gap: 0;
      z-index: 100;
    }

    /* accent glow line at top */
    .player-bar::before {
      content: '';
      position: absolute;
      top: -1px; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent) 40%, var(--accent) 60%, transparent);
      opacity: 0.55;
      filter: blur(1px);
    }

    /* ── LEFT: art + title ── */
    .now-playing {
      display: flex;
      align-items: center;
      gap: 14px;
      overflow: hidden;
      min-width: 0;
    }

    .art-thumb {
      width: 54px;
      height: 54px;
      border-radius: 8px;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.55);
      background: linear-gradient(135deg, #0f3460, #533483, #c8f542, #00d4ff, #ff6b6b, #f7971e, #0f3460);
      background-size: 400% 400%;
      transition: border-radius 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .art-thumb.spinning {
      border-radius: 50%;
      animation: grad-shift 6s ease infinite, spin-art 10s linear infinite;
      box-shadow: 0 0 22px rgba(200, 245, 66, 0.3), 0 4px 24px rgba(0,0,0,0.55);
    }

    @keyframes grad-shift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes spin-art { to { transform: rotate(360deg); } }

    .art-thumb::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.12), transparent 55%);
      border-radius: inherit;
    }

    .song-info { overflow: hidden; }

    .song-title {
      font-family: 'DM Serif Display', serif;
      font-size: 14px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: -0.01em;
    }

    .song-idle {
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 3px;
    }

    /* ── CENTER: controls + seek bar ── */
    .player-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* Skip prev / next */
    .skip-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 30px;
      border: none;
      border-radius: 50%;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      flex-shrink: 0;
      transition: color 0.15s, transform 0.1s;
      padding: 0;
    }

    .skip-btn:hover { color: var(--text); }
    .skip-btn:active { transform: scale(0.88); }
    .skip-btn:disabled { opacity: 0.2; cursor: default; pointer-events: none; }
    .skip-btn svg { width: 18px; height: 18px; fill: currentColor; display: block; }

    .mode-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
      padding: 0;
      position: relative;
      flex-shrink: 0;
    }

    .mode-btn:hover { color: var(--text); }

    .mode-btn.is-active {
      color: var(--accent);
      background: var(--accent-dim);
      border-color: rgba(200,245,66,0.35);
    }

    .mode-btn svg {
      width: 17px;
      height: 17px;
      fill: currentColor;
      display: block;
    }

    .repeat-badge {
      position: absolute;
      right: -2px;
      bottom: -2px;
      min-width: 12px;
      height: 12px;
      padding: 0 2px;
      border-radius: 999px;
      font-size: 8px;
      line-height: 12px;
      font-weight: 500;
      color: #0e0e0f;
      background: var(--accent);
      text-align: center;
      display: none;
    }

    .mode-btn.is-active .repeat-badge {
      display: block;
    }

    /* Big play / pause button */
    .play-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: none;
      background: var(--accent);
      color: #0e0e0f;
      cursor: pointer;
      flex-shrink: 0;
      transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
      box-shadow: 0 0 0 0 rgba(200,245,66,0.4);
    }

    .play-btn:hover {
      transform: scale(1.07);
      box-shadow: 0 0 18px rgba(200,245,66,0.35);
    }

    .play-btn:active { transform: scale(0.94); }
    .play-btn svg { width: 18px; height: 18px; fill: currentColor; display: block; }

    /* Seek bar row */
    .seek-row {
      display: flex;
      align-items: center;
      gap: 9px;
      width: 100%;
      max-width: 420px;
    }

    .time-label {
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.04em;
      min-width: 32px;
      font-variant-numeric: tabular-nums;
    }

    .time-label.right { text-align: right; }

    /* Range input — seek */
    input[type="range"].seek-bar,
    input[type="range"].vol-bar {
      -webkit-appearance: none;
      appearance: none;
      flex: 1;
      height: 3px;
      border-radius: 99px;
      background: var(--border);
      cursor: pointer;
      outline: none;
      position: relative;
    }

    input[type="range"].seek-bar::-webkit-slider-runnable-track {
      height: 3px; border-radius: 99px;
    }

    input[type="range"].seek-bar::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--accent);
      margin-top: -4.5px;
      box-shadow: 0 0 6px rgba(200,245,66,0.5);
      transition: transform 0.1s;
    }

    input[type="range"].seek-bar:hover::-webkit-slider-thumb { transform: scale(1.3); }

    input[type="range"].seek-bar::-moz-range-thumb {
      width: 12px; height: 12px;
      border: none; border-radius: 50%;
      background: var(--accent);
    }

    /* ── RIGHT: volume ── */
    .vol-wrap {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 9px;
    }

    .vol-icon {
      color: var(--text-muted);
      flex-shrink: 0;
      cursor: pointer;
      transition: color 0.15s;
    }

    .vol-icon:hover { color: var(--text); }
    .vol-icon svg { width: 16px; height: 16px; fill: currentColor; display: block; }

    input[type="range"].vol-bar {
      width: 80px;
    }

    input[type="range"].vol-bar::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--text-soft);
      margin-top: -3.5px;
      transition: background 0.15s;
    }

    input[type="range"].vol-bar:hover::-webkit-slider-thumb { background: var(--accent); }

    input[type="range"].vol-bar::-moz-range-thumb {
      width: 10px; height: 10px;
      border: none; border-radius: 50%;
      background: var(--text-soft);
    }

    /* hidden native audio element */
    audio { display: none; }

    /* ─────────────────────────────────────────
       NOISE GRAIN OVERLAY
    ───────────────────────────────────────── */

    /* ─────────────────────────────────────────
       NOISE GRAIN OVERLAY
    ───────────────────────────────────────── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.025;
      z-index: 9999;
    }

    /* ─────────────────────────────────────────
       RESPONSIVE
    ───────────────────────────────────────── */
    @media (max-width: 640px) {
      .player-bar {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto auto;
        height: auto;
        padding: 12px 16px;
        gap: 10px;
      }
      .now-playing { justify-content: center; }
      .vol-wrap { justify-content: center; }
      header { padding: 16px; }
      main { padding: 16px; }
    }
  </style>
</head>
<body>

<!-- ─── APP SHELL ─── -->
<div class="app">
  <header>
    <div class="logo">Wave<span>·</span>length</div>
    <div class="header-meta" id="track-count">Loading…</div>
  </header>

  <main>
    <div class="section-label">Library</div>
    <div class="library-toolbar">
      <input id="track-search" class="search-input" type="search" placeholder="Search tracks..." aria-label="Search tracks">
    </div>
    <ul id="playlist"></ul>
    <div id="filter-empty" class="state-card state-inline" style="display:none;">
      <p>No tracks match your search.</p>
    </div>
    <div id="state-view" class="state-card">
      <div class="spinner"></div>
      <p>Fetching tracks from GitHub…</p>
    </div>
  </main>
</div>

<!-- ─── FIXED PLAYER BAR ─── -->
<div class="player-bar">

  <!-- LEFT: album art + song info -->
  <div class="now-playing">
    <div class="art-thumb" id="art-thumb"></div>
    <div class="song-info">
      <div class="song-title" id="current-title">Nothing playing</div>
      <div class="song-idle" id="current-sub">Select a track to begin</div>
    </div>
  </div>

  <!-- CENTER: play controls + seek bar -->
  <div class="player-center">
    <div class="controls">
      <!-- Repeat -->
      <button class="mode-btn" id="btn-repeat" title="Repeat off" aria-label="Repeat off">
        <svg viewBox="0 0 24 24"><path d="M17 17H7v-3l-4 4 4 4v-3h10a3 3 0 0 0 3-3v-5h-2v5a1 1 0 0 1-1 1zM7 7h10v3l4-4-4-4v3H7a3 3 0 0 0-3 3v5h2V8a1 1 0 0 1 1-1z"/></svg>
        <span class="repeat-badge" id="repeat-badge"></span>
      </button>
      <!-- Prev -->
      <button class="skip-btn" id="btn-prev" disabled title="Previous">
        <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>
      <!-- Backward 10s -->
      <button class="skip-btn" id="btn-backward" disabled title="Back 10 seconds" aria-label="Back 10 seconds">
        <svg viewBox="0 0 24 24"><path d="M12 5V2L7 7l5 5V9c2.76 0 5 2.24 5 5 0 1.34-.52 2.59-1.46 3.54l1.42 1.42A6.96 6.96 0 0 0 19 14c0-3.87-3.13-7-7-7zm-4.92.38L5.66 3.96A8.94 8.94 0 0 0 3 10c0 4.97 4.03 9 9 9 2.14 0 4.11-.75 5.66-2l-1.42-1.42A6.96 6.96 0 0 1 12 17c-3.31 0-6-2.69-6-6 0-1.27.4-2.45 1.08-3.62z"/></svg>
      </button>
      <!-- Play / Pause -->
      <button class="play-btn" id="btn-play" disabled title="Play / Pause">
        <svg id="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        <svg id="icon-pause" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      </button>
      <!-- Forward 10s -->
      <button class="skip-btn" id="btn-forward" disabled title="Forward 10 seconds" aria-label="Forward 10 seconds">
        <svg viewBox="0 0 24 24"><path d="M12 5V2l5 5-5 5V9c-2.76 0-5 2.24-5 5 0 1.34.52 2.59 1.46 3.54l-1.42 1.42A6.96 6.96 0 0 1 5 14c0-3.87 3.13-7 7-7zm4.92.38 1.42-1.42A8.94 8.94 0 0 1 21 10c0 4.97-4.03 9-9 9-2.14 0-4.11-.75-5.66-2l1.42-1.42A6.96 6.96 0 0 0 12 17c3.31 0 6-2.69 6-6 0-1.27-.4-2.45-1.08-3.62z"/></svg>
      </button>
      <!-- Next -->
      <button class="skip-btn" id="btn-next" disabled title="Next">
        <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zm8-12v12h2V6h-2z"/></svg>
      </button>
      <!-- Shuffle -->
      <button class="mode-btn" id="btn-shuffle" title="Shuffle off" aria-label="Shuffle off" aria-pressed="false">
        <svg viewBox="0 0 24 24"><path d="M10.59 9.17 5.41 4 4 5.41l5.17 5.18 1.42-1.42zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zM14.83 13.41l-1.42 1.42L16.59 18H14v2h6v-6h-2v2.59l-3.17-3.18z"/></svg>
      </button>
    </div>

    <!-- Seek bar row -->
    <div class="seek-row">
      <span class="time-label" id="time-cur">0:00</span>
      <input type="range" class="seek-bar" id="seek-bar" min="0" max="100" value="0" step="0.1">
      <span class="time-label right" id="time-dur">0:00</span>
    </div>
  </div>

  <!-- RIGHT: volume -->
  <div class="vol-wrap">
    <span class="vol-icon" id="vol-icon" title="Mute / Unmute">
      <svg id="icon-vol" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
      <svg id="icon-mute" viewBox="0 0 24 24" style="display:none"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3 3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4 9.91 6.09 12 8.18V4z"/></svg>
    </span>
    <input type="range" class="vol-bar" id="vol-bar" min="0" max="1" step="0.02" value="1">
  </div>

</div>

<!-- hidden native audio -->
<audio id="audio-player" preload="none"></audio>

<script>
  /* ════════════════════════════════════════════
     CONFIG
  ════════════════════════════════════════════ */
  const githubUsername = 'Sijon20';
  const repoName       = 'music-personal';
  const musicFolder    = 'music';
  const DB_NAME        = 'wavelength-cache';
  const DB_VERSION     = 1;
  const STORE_NAME     = 'tracks';

  /* ════════════════════════════════════════════
     ELEMENTS
  ════════════════════════════════════════════ */
  const playlist     = document.getElementById('playlist');
  const audioPlayer  = document.getElementById('audio-player');
  const currentTitle = document.getElementById('current-title');
  const currentSub   = document.getElementById('current-sub');
  const trackCount   = document.getElementById('track-count');
  const trackSearch  = document.getElementById('track-search');
  const filterEmpty  = document.getElementById('filter-empty');
  const stateView    = document.getElementById('state-view');

  const btnPrev   = document.getElementById('btn-prev');
  const btnNext   = document.getElementById('btn-next');
  const btnBack   = document.getElementById('btn-backward');
  const btnFwd    = document.getElementById('btn-forward');
  const btnShuffle = document.getElementById('btn-shuffle');
  const btnRepeat  = document.getElementById('btn-repeat');
  const repeatBadge = document.getElementById('repeat-badge');
  const btnPlay   = document.getElementById('btn-play');
  const iconPlay  = document.getElementById('icon-play');
  const iconPause = document.getElementById('icon-pause');

  const seekBar  = document.getElementById('seek-bar');
  const timeCur  = document.getElementById('time-cur');
  const timeDur  = document.getElementById('time-dur');

  const volBar   = document.getElementById('vol-bar');
  const volIcon  = document.getElementById('vol-icon');
  const iconVol  = document.getElementById('icon-vol');
  const iconMute = document.getElementById('icon-mute');
  const artThumb = document.getElementById('art-thumb');

  let activeItem  = null;
  let isSeeking   = false;
  let lastVol     = 1;
  let totalTracks = 0;
  let trackDb     = null;
  let shuffleEnabled = false;
  let repeatMode = 'off';
  let shuffleOrder = [];

  const REPEAT_MODES = ['off', 'one', 'all'];

  /* ════════════════════════════════════════════
     HELPERS
  ════════════════════════════════════════════ */
  function fmtTime(s) {
    if (isNaN(s) || s < 0) return '0:00';
    const m = Math.floor(s / 60);
    const sec = String(Math.floor(s % 60)).padStart(2, '0');
    return `${m}:${sec}`;
  }

  function setPlayIcon(playing) {
    iconPlay.style.display  = playing ? 'none'  : 'block';
    iconPause.style.display = playing ? 'block' : 'none';
  }

  function updateSkipButtons() {
    const items = getVisibleItems();
    if (!activeItem || items.length === 0) {
      btnPrev.disabled = btnNext.disabled = true;
      btnBack.disabled = btnFwd.disabled = true;
      return;
    }

    const idx = items.indexOf(activeItem);
    if (idx === -1) {
      btnPrev.disabled = btnNext.disabled = true;
      btnBack.disabled = btnFwd.disabled = true;
      return;
    }

    btnBack.disabled = btnFwd.disabled = false;

    if (items.length === 1) {
      const loopSingle = repeatMode === 'all';
      btnPrev.disabled = !loopSingle;
      btnNext.disabled = !loopSingle;
      return;
    }

    const wraps = repeatMode === 'all';
    if (shuffleEnabled) {
      if (!isShuffleOrderValid(items) || !shuffleOrder.includes(activeItem)) {
        shuffleOrder = buildShuffleOrder(items, activeItem);
      }
      const sIdx = shuffleOrder.indexOf(activeItem);
      btnPrev.disabled = !wraps && sIdx <= 0;
      btnNext.disabled = !wraps && sIdx >= shuffleOrder.length - 1;
      return;
    }

    btnPrev.disabled = !wraps && idx <= 0;
    btnNext.disabled = !wraps && idx >= items.length - 1;
  }

  function getVisibleItems() {
    return Array.from(playlist.querySelectorAll('li')).filter(li => li.style.display !== 'none');
  }

  function updateTrackCount(filteredCount) {
    const query = trackSearch.value.trim();
    if (query) {
      trackCount.textContent = `${filteredCount} of ${totalTracks} tracks`;
      return;
    }
    trackCount.textContent = `${totalTracks} track${totalTracks !== 1 ? 's' : ''}`;
  }

  function applySearchFilter() {
    const query = trackSearch.value.trim().toLowerCase();
    const allItems = Array.from(playlist.querySelectorAll('li'));
    let visibleCount = 0;

    allItems.forEach(li => {
      const trackName = li.dataset.name.toLowerCase();
      const isMatch = !query || trackName.includes(query) || li === activeItem;
      li.style.display = isMatch ? '' : 'none';
      if (isMatch) visibleCount += 1;
    });

    filterEmpty.style.display = visibleCount === 0 ? 'flex' : 'none';
    if (shuffleEnabled) syncShuffleOrder();
    updateTrackCount(visibleCount);
    updateSkipButtons();
  }

  function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function buildShuffleOrder(items, current) {
    const rest = items.filter(li => li !== current);
    shuffleArray(rest);
    return current && items.includes(current) ? [current, ...rest] : rest;
  }

  function isShuffleOrderValid(items) {
    return shuffleOrder.length === items.length && shuffleOrder.every(li => items.includes(li));
  }

  function syncShuffleOrder() {
    if (!shuffleEnabled) {
      shuffleOrder = [];
      return;
    }

    const items = getVisibleItems();
    if (items.length === 0) {
      shuffleOrder = [];
      return;
    }
    shuffleOrder = buildShuffleOrder(items, activeItem);
  }

  function updateModeButtons() {
    btnShuffle.classList.toggle('is-active', shuffleEnabled);
    btnShuffle.setAttribute('aria-pressed', String(shuffleEnabled));
    btnShuffle.title = shuffleEnabled ? 'Shuffle on' : 'Shuffle off';
    btnShuffle.setAttribute('aria-label', btnShuffle.title);

    btnRepeat.classList.toggle('is-active', repeatMode !== 'off');

    if (repeatMode === 'one') {
      repeatBadge.textContent = '1';
      btnRepeat.title = 'Repeat one';
    } else if (repeatMode === 'all') {
      repeatBadge.textContent = '∞';
      btnRepeat.title = 'Repeat all';
    } else {
      repeatBadge.textContent = '';
      btnRepeat.title = 'Repeat off';
    }
    btnRepeat.setAttribute('aria-label', btnRepeat.title);
  }

  function getAdjacentTrack(direction) {
    const items = getVisibleItems();
    if (!activeItem || items.length === 0) return null;

    const wraps = repeatMode === 'all';

    if (shuffleEnabled) {
      if (!isShuffleOrderValid(items) || !shuffleOrder.includes(activeItem)) {
        shuffleOrder = buildShuffleOrder(items, activeItem);
      }
      const idx = shuffleOrder.indexOf(activeItem);
      if (idx === -1) return null;

      if (direction === 'next') {
        if (idx < shuffleOrder.length - 1) return shuffleOrder[idx + 1];
        return wraps ? shuffleOrder[0] : null;
      }
      if (idx > 0) return shuffleOrder[idx - 1];
      return wraps ? shuffleOrder[shuffleOrder.length - 1] : null;
    }

    const idx = items.indexOf(activeItem);
    if (idx === -1) return null;
    if (direction === 'next') {
      if (idx < items.length - 1) return items[idx + 1];
      return wraps ? items[0] : null;
    }
    if (idx > 0) return items[idx - 1];
    return wraps ? items[items.length - 1] : null;
  }

  function seekBy(deltaSec) {
    if (!activeItem) return;
    const duration = Number.isFinite(audioPlayer.duration) ? audioPlayer.duration : 0;
    const max = duration > 0 ? duration : Number.POSITIVE_INFINITY;
    const nextTime = Math.max(0, Math.min(max, audioPlayer.currentTime + deltaSec));
    audioPlayer.currentTime = nextTime;
    seekBar.value = nextTime;
    timeCur.textContent = fmtTime(nextTime);
    updateSeekFill();
  }

  /* Dynamic seek-bar fill (CSS gradient trick) */
  function updateSeekFill() {
    const pct = seekBar.max > 0 ? (seekBar.value / seekBar.max) * 100 : 0;
    seekBar.style.background =
      `linear-gradient(to right, var(--accent) ${pct}%, var(--border) ${pct}%)`;
  }

  function updateVolFill() {
    const pct = volBar.value * 100;
    volBar.style.background =
      `linear-gradient(to right, var(--text-soft) ${pct}%, var(--border) ${pct}%)`;
  }

  function downloadIconSvg() {
    return `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 20h14v-2H5v2zm7-18v10.17l3.59-3.58L17 10l-5 5-5-5 1.41-1.41L11 12.17V2h1z"/></svg>`;
  }

  function deleteIconSvg() {
    return `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 7h12v2H6V7zm2 3h8l-1 10H9L8 10zm3-6h2l1 1h4v2H6V5h4l1-1z"/></svg>`;
  }

  function setActionIcon(btn, downloaded) {
    btn.innerHTML = downloaded ? deleteIconSvg() : downloadIconSvg();
    btn.title = downloaded ? 'Delete downloaded file' : 'Download for offline use';
    btn.setAttribute('aria-label', btn.title);
  }

  function getTrackSource(li) {
    return li.dataset.localUrl || li.dataset.url;
  }

  function markDownloaded(li, blob) {
    if (li.dataset.localUrl) URL.revokeObjectURL(li.dataset.localUrl);
    li.dataset.localUrl = URL.createObjectURL(blob);
    li.classList.add('is-downloaded');
    setActionIcon(li.querySelector('.track-action'), true);
  }

  function markRemote(li) {
    if (li.dataset.localUrl) {
      URL.revokeObjectURL(li.dataset.localUrl);
      delete li.dataset.localUrl;
    }
    li.classList.remove('is-downloaded');
    setActionIcon(li.querySelector('.track-action'), false);
  }

  function openTrackDb() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, DB_VERSION);

      req.onupgradeneeded = () => {
        const db = req.result;
        if (!db.objectStoreNames.contains(STORE_NAME)) {
          db.createObjectStore(STORE_NAME, { keyPath: 'id' });
        }
      };

      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }

  function idbGet(id) {
    if (!trackDb) return Promise.resolve(null);
    return new Promise((resolve, reject) => {
      const tx = trackDb.transaction(STORE_NAME, 'readonly');
      const store = tx.objectStore(STORE_NAME);
      const req = store.get(id);
      req.onsuccess = () => resolve(req.result || null);
      req.onerror = () => reject(req.error);
    });
  }

  function idbPut(record) {
    if (!trackDb) return Promise.resolve();
    return new Promise((resolve, reject) => {
      const tx = trackDb.transaction(STORE_NAME, 'readwrite');
      const store = tx.objectStore(STORE_NAME);
      const req = store.put(record);
      req.onsuccess = () => resolve();
      req.onerror = () => reject(req.error);
    });
  }

  function idbDelete(id) {
    if (!trackDb) return Promise.resolve();
    return new Promise((resolve, reject) => {
      const tx = trackDb.transaction(STORE_NAME, 'readwrite');
      const store = tx.objectStore(STORE_NAME);
      const req = store.delete(id);
      req.onsuccess = () => resolve();
      req.onerror = () => reject(req.error);
    });
  }

  async function toggleTrackDownload(li, actionBtn) {
    if (!trackDb) return;

    const isDownloaded = li.classList.contains('is-downloaded');
    actionBtn.disabled = true;

    try {
      if (!isDownloaded) {
        const res = await fetch(li.dataset.url);
        if (!res.ok) throw new Error(`Download failed: ${res.status}`);
        const blob = await res.blob();
        await idbPut({ id: li.dataset.id, name: li.dataset.name, blob });
        markDownloaded(li, blob);
      } else {
        await idbDelete(li.dataset.id);
        const wasPlayingThisTrack = activeItem === li && !audioPlayer.paused;
        markRemote(li);

        if (wasPlayingThisTrack) {
          const t = audioPlayer.currentTime;
          audioPlayer.src = li.dataset.url;
          audioPlayer.currentTime = t;
          audioPlayer.play();
        }
      }
    } catch (err) {
      console.error(err);
    } finally {
      actionBtn.disabled = false;
    }
  }

  function syncPlayerHeight() {
    const playerBar = document.querySelector('.player-bar');
    const playerHeight = playerBar ? playerBar.offsetHeight : 0;
    document.documentElement.style.setProperty('--player-effective-h', `${playerHeight}px`);
  }

  /* ════════════════════════════════════════════
     FETCH TRACKS FROM GITHUB API
  ════════════════════════════════════════════ */
  const API_URL =
    `https://api.github.com/repos/${githubUsername}/${repoName}/contents/${musicFolder}`;

  async function loadTracks() {
    try {
      const res = await fetch(API_URL);
      if (!res.ok) {
        const msg = res.status === 404
          ? `Repo or folder not found.<br>Check <code>${githubUsername}/${repoName}/${musicFolder}</code>`
          : `GitHub API error: ${res.status} ${res.statusText}`;
        showError(msg); return;
      }

      const files = await res.json();
      const audioFiles = files.filter(f =>
        f.type === 'file' && /\.(mp3|wav|ogg|flac|m4a)$/i.test(f.name)
      );

      if (audioFiles.length === 0) { showEmpty(); return; }

      stateView.style.display = 'none';
      totalTracks = audioFiles.length;
      updateTrackCount(totalTracks);

      audioFiles.forEach((file, index) => {
        const ext         = file.name.split('.').pop().toLowerCase();
        const displayName = file.name.replace(/\.[^.]+$/, '');
        const li          = document.createElement('li');
        const trackId     = file.path || `${musicFolder}/${file.name}`;

        li.innerHTML = `
          <span class="track-num">${String(index + 1).padStart(2, '0')}</span>
          <span class="track-icon"></span>
          <span class="track-title">${displayName}</span>
          <button class="track-action" type="button" aria-label="Download for offline use" title="Download for offline use">${downloadIconSvg()}</button>
          <span class="track-ext">${ext}</span>
        `;

        li.dataset.url  = file.download_url;
        li.dataset.name = displayName;
        li.dataset.id   = trackId;

        const actionBtn = li.querySelector('.track-action');
        if (!trackDb) {
          actionBtn.disabled = true;
          actionBtn.title = 'Offline download unavailable';
          actionBtn.setAttribute('aria-label', actionBtn.title);
        }
        actionBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          toggleTrackDownload(li, actionBtn);
        });

        li.addEventListener('click', () => playTrack(li));
        playlist.appendChild(li);
      });

      const items = Array.from(playlist.querySelectorAll('li'));
      for (const li of items) {
        const cached = await idbGet(li.dataset.id);
        if (cached?.blob) markDownloaded(li, cached.blob);
      }

      applySearchFilter();

    } catch (err) {
      showError(`Network error:<br><code>${err.message}</code>`);
    }
  }

  /* ════════════════════════════════════════════
     PLAYBACK
  ════════════════════════════════════════════ */
  function playTrack(li) {
    if (activeItem && activeItem !== li) {
      activeItem.classList.remove('active');
      const barsEl = activeItem.querySelector('.track-icon');
      if (barsEl) barsEl.innerHTML = '';
    }

    li.classList.add('active');
    activeItem = li;

    const iconSlot = li.querySelector('.track-icon');
    iconSlot.innerHTML = `<span class="bars"><span></span><span></span><span></span></span>`;

    audioPlayer.src = getTrackSource(li);
    audioPlayer.play();

    currentTitle.textContent = li.dataset.name;
    currentSub.textContent   = 'Now playing';
    btnPlay.disabled = false;

    if (shuffleEnabled) {
      const visible = getVisibleItems();
      if (!isShuffleOrderValid(visible) || !shuffleOrder.includes(li)) {
        shuffleOrder = buildShuffleOrder(visible, li);
      }
    }

    li.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    updateSkipButtons();
  }

  /* ════════════════════════════════════════════
     PLAY / PAUSE BUTTON
  ════════════════════════════════════════════ */
  btnPlay.addEventListener('click', () => {
    if (audioPlayer.paused) audioPlayer.play();
    else audioPlayer.pause();
  });

  /* ════════════════════════════════════════════
     PREV / NEXT
  ════════════════════════════════════════════ */
  btnPrev.addEventListener('click', () => {
    const prev = getAdjacentTrack('prev');
    if (prev) playTrack(prev);
  });

  btnNext.addEventListener('click', () => {
    const next = getAdjacentTrack('next');
    if (next) playTrack(next);
  });

  btnBack.addEventListener('click', () => seekBy(-10));
  btnFwd.addEventListener('click', () => seekBy(10));

  btnShuffle.addEventListener('click', () => {
    shuffleEnabled = !shuffleEnabled;
    syncShuffleOrder();
    updateModeButtons();
    updateSkipButtons();
  });

  btnRepeat.addEventListener('click', () => {
    const idx = REPEAT_MODES.indexOf(repeatMode);
    repeatMode = REPEAT_MODES[(idx + 1) % REPEAT_MODES.length];
    updateModeButtons();
    updateSkipButtons();
  });

  /* ════════════════════════════════════════════
     AUDIO EVENTS
  ════════════════════════════════════════════ */
  audioPlayer.addEventListener('play', () => {
    setPlayIcon(true);
    artThumb.classList.add('spinning');
    if (activeItem) {
      activeItem.querySelectorAll('.bars span')
        .forEach(b => b.style.animationPlayState = 'running');
      currentSub.textContent = 'Now playing';
    }
  });

  audioPlayer.addEventListener('pause', () => {
    setPlayIcon(false);
    artThumb.classList.remove('spinning');
    if (activeItem) {
      activeItem.querySelectorAll('.bars span')
        .forEach(b => b.style.animationPlayState = 'paused');
      currentSub.textContent = 'Paused';
    }
  });

  audioPlayer.addEventListener('ended', () => {
    if (repeatMode === 'one' && activeItem) {
      audioPlayer.currentTime = 0;
      audioPlayer.play();
      return;
    }

    const next = getAdjacentTrack('next');
    if (next) {
      playTrack(next);
      return;
    }

    setPlayIcon(false);
    artThumb.classList.remove('spinning');
    currentSub.textContent = 'Finished';
  });

  audioPlayer.addEventListener('loadedmetadata', () => {
    seekBar.max = audioPlayer.duration || 0;
    timeDur.textContent = fmtTime(audioPlayer.duration);
    updateSeekFill();
  });

  audioPlayer.addEventListener('timeupdate', () => {
    if (isSeeking) return;
    seekBar.value = audioPlayer.currentTime;
    timeCur.textContent = fmtTime(audioPlayer.currentTime);
    updateSeekFill();
  });

  /* ════════════════════════════════════════════
     SEEK BAR
  ════════════════════════════════════════════ */
  seekBar.addEventListener('mousedown', () => isSeeking = true);
  seekBar.addEventListener('touchstart', () => isSeeking = true, { passive: true });

  seekBar.addEventListener('input', () => {
    timeCur.textContent = fmtTime(seekBar.value);
    updateSeekFill();
  });

  seekBar.addEventListener('change', () => {
    audioPlayer.currentTime = seekBar.value;
    isSeeking = false;
  });

  /* ════════════════════════════════════════════
     VOLUME
  ════════════════════════════════════════════ */
  volBar.addEventListener('input', () => {
    audioPlayer.volume = volBar.value;
    lastVol = volBar.value > 0 ? volBar.value : lastVol;
    iconVol.style.display  = volBar.value > 0 ? 'block' : 'none';
    iconMute.style.display = volBar.value > 0 ? 'none'  : 'block';
    updateVolFill();
  });

  volIcon.addEventListener('click', () => {
    if (audioPlayer.volume > 0) {
      lastVol = audioPlayer.volume;
      audioPlayer.volume = volBar.value = 0;
    } else {
      audioPlayer.volume = volBar.value = lastVol || 1;
    }
    iconVol.style.display  = audioPlayer.volume > 0 ? 'block' : 'none';
    iconMute.style.display = audioPlayer.volume > 0 ? 'none'  : 'block';
    updateVolFill();
  });

  /* ════════════════════════════════════════════
     SEARCH
  ════════════════════════════════════════════ */
  trackSearch.addEventListener('input', applySearchFilter);

  updateModeButtons();

  /* ════════════════════════════════════════════
     INIT fills
  ════════════════════════════════════════════ */
  updateSeekFill();
  updateVolFill();
  syncPlayerHeight();
  window.addEventListener('resize', syncPlayerHeight);

  /* ════════════════════════════════════════════
     STATE HELPERS
  ════════════════════════════════════════════ */
  function showError(html) {
    trackCount.textContent = 'Error';
    stateView.innerHTML = `<div class="icon">⚠️</div><p>${html}</p>`;
  }

  function showEmpty() {
    trackCount.textContent = '0 tracks';
    stateView.innerHTML = `
      <div class="icon">🎵</div>
      <p>No <code>.mp3</code> or <code>.wav</code> files found in <code>${musicFolder}/</code>.<br>
         Add audio files to your GitHub repo and reload.</p>`;
  }

  /* ════════════════════════════════════════════
     BOOT
  ════════════════════════════════════════════ */
  (async () => {
    try {
      trackDb = await openTrackDb();
      await loadTracks();
    } catch (err) {
      console.error('IndexedDB unavailable:', err);
      await loadTracks();
    }
  })();
</script>

</body>
</html>
